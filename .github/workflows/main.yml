name: Gerar APK do Modificador de Voz

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Passo 1 - Baixar o codigo
        uses: actions/checkout@v4

      - name: Passo 2 - Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Passo 3 - Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Passo 4 - Instalar dependencias
        run: npm install

      - name: Passo 5 - Instalar Expo CLI
        run: npm install -g eas-cli

      - name: Passo 6 - Criar estrutura nativa
        run: npx expo prebuild --platform android

      - name: Passo 7 - Compilar APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Passo 8 - Salvar arquivo final
        uses: actions/upload-artifact@v4
        with:
          name: aplicativo-modificador-de-voz
          path: android/app/build/outputs/apk/release/app-release.apk
